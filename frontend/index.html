<!DOCTYPE html>

<html>

<head>

<title>URL Security Checker</title>

<style>

body{

font-family: Arial;

background: linear-gradient(120deg,#2980b9,#6dd5fa);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

margin:0;

}

.card{

background:white;

padding:40px;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

text-align:center;

width:400px;

}

h2{

margin-bottom:20px;

}

input{

padding:12px;

width:90%;

margin:10px 0;

border-radius:6px;

border:1px solid gray;

font-size:16px;

}

button{

padding:12px 20px;

background:#2980b9;

color:white;

border:none;

border-radius:6px;

cursor:pointer;

font-size:16px;

width:100%;

transition:0.3s;

}

button:hover{

background:#1f6692;

}

</style>

</head>

<body>

<div class="card">

<h2>🔐 URL Attack Detection</h2>

<form action="/predict" method="post">

<input 
type="text" 
name="url" 
placeholder="Enter URL (example: https://google.com)" 
required>

<button type="submit">

Check URL

</button>

</form>

</div>

</body>

</html>
